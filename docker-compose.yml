services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gff_user
      POSTGRES_PASSWORD: gff_password
      POSTGRES_DB: goodfirstfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gff_user -d goodfirstfinder"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
